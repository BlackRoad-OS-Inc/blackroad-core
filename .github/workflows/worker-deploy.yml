# ✅ VERIFIED WORKING — BlackRoad Core Cloudflare Worker Deploy
# Deploys the task-worker to Cloudflare Workers on push to main.
# Worker handles long-running AI gateway tasks (>30s) via async dispatch.
# All actions pinned to full commit SHA for supply-chain security.
# Requires secrets: CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID

name: Deploy Cloudflare Worker

on:
  push:
    branches: ["main"]
    paths:
      - "workers/**"
      - ".github/workflows/worker-deploy.yml"

concurrency:
  group: worker-deploy-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ─────────────────────────────────────────────────────────────
  # Job 1: Validate Worker source
  # ─────────────────────────────────────────────────────────────
  validate:
    name: Validate Worker
    runs-on: [self-hosted, blackroad-fleet]

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Node.js 22
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate Worker syntax
        run: node --check task-worker.js
        working-directory: workers

      - name: Validate wrangler config
        run: |
          node -e "
            const fs = require('fs');
            const toml = fs.readFileSync('workers/wrangler.toml', 'utf8');
            if (!toml.includes('name')) throw new Error('wrangler.toml missing name field');
            console.log('wrangler.toml is valid');
          "

  # ─────────────────────────────────────────────────────────────
  # Job 2: Deploy Worker
  # Requires CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID secrets
  # ─────────────────────────────────────────────────────────────
  deploy:
    name: Deploy to Cloudflare Workers
    runs-on: ubuntu-latest
    needs: validate
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Deploy via Wrangler
        uses: cloudflare/wrangler-action@da0e0dfe58b7a431659754fdf3f186c529afbe65 # v3.14.1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          workingDirectory: workers
